name: 构建
on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact: ${{ steps.artifact.outputs.artifact-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: pnpm

      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Install Frontend dependencies
        run: pnpm install

      - name: Build Frontend
        run: pnpm --recursive build

      - name: Restore .NET
        run: dotnet restore --graph --artifacts-path artifacts

      - name: Build .NET
        run: dotnet build --graph --artifacts-path artifacts --configuration Release --no-restore

      - name: Publish .NET
        run: dotnet publish --graph --artifacts-path artifacts --configuration Release --no-restore --no-build

      - id: artifact
        name: Collect artifact
        uses: actions/upload-artifact@v7
        with:
          name: BiliLive.Observer
          path: |
            ./artifacts/publish/BiliLive.Service/release/*
          retention-days: 7

  publish:
    needs: build
    name: 发布
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      discussions: write
    runs-on: ubuntu-latest
    steps:
      - name: Download a Build Artifact
        uses: actions/download-artifact@v8
        with:
          skip-decompress: true
          name: BiliLive.Observer

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: BiliLive.Observer.zip
